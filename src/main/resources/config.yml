# Selected config
#   THIS     - use this config, disregard advanced.yml if it exists
#   ADVANCED - use advanced.yml, disregard the rest of this file.
#              The advanced.yml file will be generated when first selected,
#              with the placeholders from this file
#   ONLINE/[config-name] (planned) - use the cloud config
config: ADVANCED

prefix: "&8[&c&lIntave&8]&7 "

kick-commands:
  - "kick {player} &c[FusionAC] Подозрение в читерстве"

ban-commands:
  - "tempban {player} 30d &c[FusionAC] Подозрение в читерстве"

# Movement setback sensitivity
#   Choose between AGGRESSIVE, CAREFUL, LENIENT, BARELY and SILENT
#   FALSE POSITIVES? -> REPORT THEM
physics-mm: AGGRESSIVE

# Cloud privacy control
#   HIGHEST_PRIVACY - only the most critical data is sent (player UUID and usage data)
#   BEST_DETECTION  - also share IP address for long-term cross-account analysis & detection
#
# BEST_DETECTION requires you to update your server's privacy policy or let players know
#                the first time they join, as it is considered personal data under GDPR.
privacy: HIGHEST_PRIVACY

verbose: "{prefix} &c{player}&7/{trust-color}&7 {message} {details} (+{vladded} -> {vl})"
notify: "{prefix} &c&lInfo&8: &7{text}"